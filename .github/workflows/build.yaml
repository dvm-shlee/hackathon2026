name: Build Next.js app

on:
  push:
    branches:
      - main # or your default branch, e.g., master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Or a version compatible with your project

      - name: Install dependencies
        run: npm install # or yarn install, pnpm install

      - name: Build Next.js app
        run: npm run build # or yarn build, pnpm build

      # Optional: Upload the build artifact for later deployment
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next # The default build output directory
